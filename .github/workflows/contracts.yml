# Contracts CI — Foundry build / test / coverage / static analysis.
# Workflow-level path filter (per-job paths: unsupported).
# Rename a job here only if you also update branch-protection rules.

name: Contracts

on:
  push:
    branches: ["**"]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  workflow_dispatch:

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  contracts:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1.8.0
        with:
          version: v1.7.1
      - name: Install Foundry dependencies
        run: bash scripts/install-deps.sh
      - name: forge fmt --check
        run: forge fmt --check
      - name: forge build --sizes
        run: forge build --sizes
      - name: forge test -vvv
        run: forge test -vvv
      - name: forge coverage --report summary
        # Coverage gate: floor on % Lines AND non-zero Lines denominator.
        # Read from file (not pipe) so grep -q + tee under pipefail can't
        # SIGPIPE-trigger a spurious 141.
        #
        # Post-merge silent-failure-hunter on PR #8 caught two gaps in the
        # earlier `(0/0)` regex: (a) it anchored on the first `% (n/m)`
        # cell only, so future contracts with covered Lines but zero
        # Statements/Branches/Funcs passed vacuously; (b) the "deleted
        # test, kept source" failure mode produced `0.00% (0/2)` —
        # legitimate denominator but zero coverage. A `% Lines >= 80%`
        # floor closes both: it requires both a non-zero denominator AND
        # meaningful coverage on the metric that matters (Lines).
        run: |
          set -euo pipefail
          forge coverage --report summary | tee /tmp/forge-coverage.txt
          if ! grep -qE "^\|\s*Total\s*\|" /tmp/forge-coverage.txt; then
            echo "::error::forge coverage output shape changed — no Total row found"
            exit 1
          fi
          # Extract the `% Lines` cell from the Total row (1st `%` after Total).
          lines_pct=$(grep -E "^\|\s*Total\s*\|" /tmp/forge-coverage.txt \
            | grep -oE "[0-9.]+% \([0-9]+/[0-9]+\)" \
            | head -n1)
          # Parse numerator + denominator.
          covered=$(echo "$lines_pct" | grep -oE "\([0-9]+/" | tr -d '(/')
          total=$(echo "$lines_pct" | grep -oE "/[0-9]+\)" | tr -d '/)')
          if [ -z "$total" ] || [ "$total" -eq 0 ]; then
            echo "::error::Coverage is vacuous on Lines (denominator 0/0) — src/ must contain analyzable source"
            exit 1
          fi
          # Compute % as integer (covered*100 / total), gate at >= 80.
          pct=$(( covered * 100 / total ))
          echo "Coverage: $covered/$total lines = ${pct}%"
          if [ "$pct" -lt 80 ]; then
            echo "::error::Coverage below 80% floor (got ${pct}%, need >= 80). Add tests or relax floor with rationale."
            exit 1
          fi

  contracts-security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1.8.0
        with:
          version: v1.7.1
      - name: Install Foundry dependencies
        run: bash contracts/scripts/install-deps.sh
      # Slither runs unconditionally. The post-merge review of PR #7 caught
      # that ANY `if:` skip on a required check is a branch-protection
      # bypass (GH treats skipped-step as success). Real source must exist
      # in contracts/src/ for slither to analyze — that's now guaranteed
      # by Placeholder.sol until story-10 ships ConciergeRegistry.
      - name: Slither static analysis
        uses: crytic/slither-action@v0.4.2
        with:
          target: contracts/
          slither-config: contracts/.slither.config.json
          fail-on: high
          slither-version: 0.11.5
