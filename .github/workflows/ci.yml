# CI — TypeScript pipeline.
# Branch protection: rename a job here only if you also update the protection
# rule — renaming silently bypasses the gate.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "22"

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate workflow YAML (actionlint)
        # reviewdog/action-actionlint wraps the actionlint binary. Tracked
        # by Dependabot via the existing github-actions ecosystem entry —
        # no manual version pinning. `fail_level: error` makes the step
        # fail the job on lint errors (default is warn-only).
        uses: reviewdog/action-actionlint@v1.72.0
        with:
          fail_level: error
      - run: pnpm run check

  typecheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  loc-cap:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run loc:check

  test-config:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Install slither so scripts/test-slither-config.mjs ACTUALLY runs
      # under CI (without this, `which slither` returns non-zero and the
      # smoke test exits 0 silently — defeating its purpose). Matches the
      # version pinned in contracts.yml's slither-action.
      - run: pip install slither-analyzer==0.11.5
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:config

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
      - run: pnpm install --frozen-lockfile
      # Build Foundry contracts so integration tests can load artifacts from contracts/out/.
      - run: forge build
        working-directory: contracts
      # `pnpm -r run test` recurses workspace packages. NO --if-present:
      # per silent-failure-hunter on PR #4, --if-present silently skips
      # packages without a test script — the existential silent-CI-failure
      # mode. Without it, a workspace package that lacks `test` will fail
      # loudly, which is the contract we want.
      - run: pnpm -r run test

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
