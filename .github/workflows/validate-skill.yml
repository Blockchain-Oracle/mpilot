name: validate-skill

# Story-151: path-filtered trigger so we only spend CI cycles when the skill
# manifest OR its surrounding files actually change.

on:
  pull_request:
    paths:
      - 'packages/skill-mantle-agent/SKILL.md'
      - 'packages/skill-mantle-agent/scripts/validate-manifest.ts'
      - 'packages/skill-mantle-agent/schemas/skill-manifest.schema.json'
      - 'packages/skill-mantle-agent/__tests__/manifest-cross-check.test.ts'
      - '.github/workflows/validate-skill.yml'
  push:
    branches: [main]
    paths:
      - 'packages/skill-mantle-agent/SKILL.md'

concurrency:
  group: validate-skill-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install (skill package + its deps)
        run: pnpm install --frozen-lockfile

      - name: Run Zod-based manifest validator
        run: pnpm --filter @concierge-mantle/skill-mantle-agent run validate-manifest

      - name: Run manifest cross-check tests
        run: pnpm --filter @concierge-mantle/skill-mantle-agent run test
