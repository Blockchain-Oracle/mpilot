# Gitleaks config for Concierge. Extends the upstream default ruleset
# with Concierge-specific secret shapes.

title = "Concierge gitleaks config"

# Inherit upstream default rules (AWS, GCP, GitHub PATs, generic high-
# entropy strings, etc).
[extend]
useDefault = true

# Concierge-specific rules ─────────────────────────────────────────────

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-...)"
regex = '''sk-ant-[a-zA-Z0-9_-]{80,120}'''
keywords = ["sk-ant-"]

[[rules]]
id = "pimlico-api-key"
description = "Pimlico bundler/paymaster API key (pim_...)"
regex = '''pim_[a-zA-Z0-9]{40,80}'''
keywords = ["pim_"]

[[rules]]
id = "zerodev-project-id"
description = "ZeroDev project ID (UUID inside ZERODEV_PROJECT_ID)"
regex = '''(?i)ZERODEV_PROJECT_ID\s*=\s*["']?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}["']?'''
keywords = ["zerodev_project_id"]

[[rules]]
id = "pinata-jwt"
description = "Pinata JWT (eyJ... long token in PINATA_JWT)"
regex = '''(?i)PINATA_JWT\s*=\s*["']?eyJ[a-zA-Z0-9_-]{100,}["']?'''
keywords = ["pinata_jwt"]

[[rules]]
id = "privy-app-secret"
description = "Privy app secret (PRIVY_APP_SECRET=)"
regex = '''(?i)PRIVY_APP_SECRET\s*=\s*["']?[a-zA-Z0-9_-]{40,80}["']?'''
keywords = ["privy_app_secret"]

[[rules]]
id = "mantle-private-key-in-env"
description = "0x-prefixed 64-hex private key inside a .env file"
regex = '''(?i)(MANTLE_PRIVATE_KEY|DEPLOYER_PRIVATE_KEY|PRIVATE_KEY)\s*=\s*["']?0x[0-9a-f]{64}["']?'''
path = '''\.env(\.[a-zA-Z]+)?$'''
keywords = ["private_key"]

# Allowlist ────────────────────────────────────────────────────────────
# NARROW allowlist — only files that legitimately need to bypass scan
# (lockfiles, build artefacts, third-party libs). DO NOT add broad
# directory patterns like `research/` or `docs/` — code-reviewer
# + silent-failure-hunter + type-design on PR #10 caught that path
# patterns disable ALL rules (default + custom) inside the matched tree.
# An agent debugging Pimlico/ZeroDev/Anthropic auth could paste a real
# key into an audit doc, and we WANT gitleaks to catch it.

[allowlist]
description = "Build-artefact paths + public on-chain data shapes"
paths = [
  '''node_modules/''',
  '''pnpm-lock\.yaml$''',
  '''\.git/''',
  '''contracts/lib/''',
  '''contracts/out/''',
  '''contracts/cache/''',
  '''contracts/broadcast/''',
]
# Content-based allowlist: 40-hex shapes prefixed with 0x are Ethereum /
# Mantle contract addresses — public on-chain data, never secrets.
# Without this, gitleaks's upstream `generic-api-key` rule flags every
# contract address in research/ + audit docs as high-entropy → false
# positive. The path-scoped `mantle-private-key-in-env` rule (which
# matches 64-hex inside .env files) still fires correctly because its
# regex requires the .env path AND the 64-hex shape — different from
# this 40-hex content allowlist.
regexes = [
  '''^0x[0-9a-fA-F]{40}$''',
  # Foundry/Hardhat account #0 from the "test test ... junk" mnemonic — public
  # test-infrastructure key shipped in every Anvil/Hardhat install. Not a real secret.
  '''0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80''',
]
regexTarget = "secret"
